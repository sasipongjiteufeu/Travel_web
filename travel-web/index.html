    ↑

  <script>
    const btn = document.getElementById("backToTop");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) {
        btn.classList.remove("hidden");
        btn.classList.add("flex");
      } else {
        btn.classList.add("hidden");
        btn.classList.remove("flex");
      }
    });

    btn.addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });
  </script>



  <script>
    const scroller = document.getElementById("pagerScroll");
    const leftHint = document.getElementById("pagerLeft");
    const rightHint = document.getElementById("pagerRight");
    const arrowLeft = document.getElementById("arrowLeft");
    const arrowRight = document.getElementById("arrowRight");

    let userInteracted = false;

    function updatePagerHints() {
      if (!scroller) return;

      const maxScroll = scroller.scrollWidth - scroller.clientWidth;
      const x = scroller.scrollLeft;

      // If no overflow, hide both
      if (maxScroll <= 1) {
        leftHint.style.opacity = "0";
        rightHint.style.opacity = "0";
        arrowLeft.classList.remove("nudge-left");
        arrowRight.classList.remove("nudge-right");
        return;
      }

      const canScrollLeft = x > 6;
      const canScrollRight = x < maxScroll - 6;

      // show/hide fades
      leftHint.style.opacity = canScrollLeft ? "1" : "0";
      rightHint.style.opacity = canScrollRight ? "1" : "0";

      // animate arrows only when:
      // - there is more content in that direction
      // - and user hasn't interacted yet (optional UX)
      if (!userInteracted && canScrollRight) {
        arrowRight.classList.add("nudge-right");
      } else {
        arrowRight.classList.remove("nudge-right");
      }

      if (!userInteracted && canScrollLeft) {
        arrowLeft.classList.add("nudge-left");
      } else {
        arrowLeft.classList.remove("nudge-left");
      }

      // If user reaches far right, stop right animation anyway
      if (!canScrollRight) arrowRight.classList.remove("nudge-right");
      if (!canScrollLeft) arrowLeft.classList.remove("nudge-left");
    }

    function markInteracted() {
      userInteracted = true;
      arrowLeft.classList.remove("nudge-left");
      arrowRight.classList.remove("nudge-right");
    }

    if (scroller) {
      scroller.addEventListener("scroll", () => {
        markInteracted();
        updatePagerHints();
      }, { passive: true });

      scroller.addEventListener("touchstart", markInteracted, { passive: true });
      scroller.addEventListener("wheel", markInteracted, { passive: true });
    }

    window.addEventListener("resize", updatePagerHints);

    updatePagerHints();
  </script>
